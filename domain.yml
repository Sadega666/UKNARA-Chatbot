responses:
  utter_tanya_ukm_adhyatmaka:
  - text: "UKM Adhyatmaka adalah organisasi mahasiswa berbasis rohani Katolik di kampus.\
      \ \nUKM ini menjadi tempat bagi mahasiswa Katolik untuk berkumpul, berkenalan,\
      \ dan mempererat hubungan dengan sesama. \nTujuan utamanya adalah untuk memuliakan\
      \ Tuhan melalui berbagai kegiatan rohani.\n"
  utter_fungsi_ukm_adhyatmaka:
  - text: "Fungsi UKM Adhyatmaka adalah sebagai wadah pembinaan iman dan spiritual\
      \ mahasiswa, \nserta tempat untuk membangun komunitas yang saling mendukung\
      \ dalam kehidupan rohani.\n"
  utter_tujuan_ukm_adhyatmaka:
  - text: "Tujuan utama UKM Adhyatmaka adalah memuliakan Tuhan serta membantu mahasiswa\
      \ \ndalam memperdalam iman dan membangun relasi dengan sesama.\n"
  utter_misi_adhyatmaka:
  - text: "Misi UKM Adhyatmaka adalah menyelenggarakan kegiatan rohani seperti doa\
      \ bersama, \npendalaman iman, dan pelayanan agar mahasiswa dapat bertumbuh secara\
      \ spiritual.\n"
  utter_visi_adhyatmaka:
  - text: "Visi UKM Adhyatmaka adalah menjadi komunitas rohani yang aktif, \nsolid,\
      \ dan mampu membawa mahasiswa lebih dekat kepada Tuhan.\n"
  utter_bidang_ukm_adhyatmaka:
  - text: "UKM Adhyatmaka bergerak di bidang keagamaan (rohani Katolik), \ndengan\
      \ fokus pada kegiatan ibadah, pelayanan, dan pengembangan iman.\n"
  utter_boleh_gabung_adhyatmaka:
  - text: "UKM Adhyatmaka terbuka untuk mahasiswa Katolik, \nnamun mahasiswa non-Katolik\
      \ juga diperbolehkan untuk bergabung dan mengikuti kegiatan.\n"
  utter_cara_daftar_adhyatmaka:
  - text: 'Cara daftar UKM Adhyatmaka cukup mudah, yaitu dengan mengisi data diri
      melalui Google Form (GForm) yang disediakan.

      '
  utter_biaya_daftar_adhyatmaka:
  - text: 'Pendaftaran UKM Adhyatmaka tidak dikenakan biaya alias gratis.

      '
  utter_status_pendaftaran_adhyatmaka:
  - text: "Pendaftaran UKM Adhyatmaka dibuka sepanjang waktu, \njadi kamu bisa bergabung\
      \ kapan saja tanpa batas periode tertentu.\n"
  utter_syarat_anggota_adhyatmaka:
  - text: "Tidak ada syarat khusus untuk bergabung di UKM Adhyatmaka. \nSemua mahasiswa\
      \ dapat ikut serta tanpa persyaratan tertentu.\n"
  utter_keanggotaan_adhyatmaka:
  - text: "Keanggotaan di UKM Adhyatmaka bersifat fleksibel. \nKamu tetap diperbolehkan\
      \ mengikuti UKM lain tanpa batasan.\n"
  utter_kegiatan_adhyatmaka:
  - text: 'Kegiatan UKM Adhyatmaka meliputi:

      - Persekutuan doa

      - Katekumen

      - Legiomaria

      - Welcoming party

      - Retret dan rekoleksi

      - Perayaan Natal, Paskah, dan misa

      - Bakti sosial (baksos)

      - Ziarah

      '
  utter_kegiatan_rutin_adhyatmaka:
  - text: 'Kegiatan rutin UKM Adhyatmaka meliputi:

      - Persekutuan doa (setiap Sabtu)

      - Katekumen (Sabtu)

      - Legiomaria (Selasa/Kamis)

      Durasi kegiatan sekitar 1–2 jam.

      '
  utter_kegiatan_persekutuan_adhyatmaka:
  - text: "Persekutuan doa adalah kegiatan berkumpul untuk berdoa bersama, \nberbagi\
      \ pengalaman iman, dan mempererat kebersamaan antar anggota.\n"
  utter_kegiatan_katekumen_adhyatmaka:
  - text: "Katekumen adalah kegiatan pembelajaran iman Katolik, \nbiasanya ditujukan\
      \ bagi yang ingin memperdalam atau mempersiapkan diri dalam ajaran gereja.\n"
  utter_kegiatan_legiomaria_adhyatmaka:
  - text: "Legiomaria adalah kegiatan pelayanan rohani yang berfokus pada doa, \n\
      pengabdian, dan pelayanan kepada sesama.\n"
  utter_jadwal_rutin_adhyatmaka:
  - text: 'Jadwal kegiatan rutin:

      - Persekutuan doa: Sabtu (1–2 jam)

      - Katekumen: Sabtu (1–2 jam)

      - Legiomaria: Selasa/Kamis (1–2 jam)

      '
  utter_durasi_kegiatan_adhyatmaka:
  - text: 'Rata-rata durasi kegiatan UKM Adhyatmaka adalah sekitar 1–2 jam per sesi.

      '
  utter_lokasi_kegiatan_adhyatmaka:
  - text: "Kegiatan UKM Adhyatmaka biasanya dilaksanakan di dalam kampus, \nseperti\
      \ di auditorium lantai 8 Gedung M, serta lokasi tertentu untuk kegiatan khusus\
      \ seperti retret dan ziarah.\n"
  utter_event_adhyatmaka:
  - text: 'Event utama UKM Adhyatmaka antara lain:

      - Welcoming Party (Agustus)

      - Retret Hidup Dalam Roh Kudus (Oktober)

      - FLOOR/LK (Oktober)

      - Perayaan Natal & Misa (Desember)

      - Bakti Sosial (Januari)

      - Rekoleksi (Februari)

      - Pekan Suci & Paskah (Februari/Maret)

      - Ziarah (Mei)

      '
  utter_jadwal_retret_adhyatmaka:
  - text: 'Retret biasanya dilaksanakan pada bulan Oktober selama 3 hari 2 malam di
      Puncak.

      '
  utter_jadwal_natal_adhyatmaka:
  - text: 'Perayaan Natal diadakan pada bulan Desember di Auditorium lantai 8 Gedung
      M.

      '
  utter_jadwal_paskah_adhyatmaka:
  - text: 'Perayaan Paskah biasanya diadakan pada bulan Februari atau Maret di Auditorium
      lantai 8 Gedung M.

      '
  utter_jadwal_misa_adhyatmaka:
  - text: "Misa biasanya dilaksanakan saat event besar seperti Natal dan Pekan Suci,\
      \ \ndengan durasi sekitar 1 jam di Auditorium Gedung M.\n"
  utter_jadwal_ziarah_adhyatmaka:
  - text: 'Kegiatan ziarah biasanya dilaksanakan pada bulan Mei dan berlangsung selama
      satu hari penuh di Goa Maria.

      '
  utter_jadwal_baksos_adhyatmaka:
  - text: 'Kegiatan bakti sosial (baksos) biasanya dilaksanakan pada bulan Januari.

      '
  utter_divisi_adhyatmaka:
  - text: 'Divisi UKM Adhyatmaka terbagi menjadi:

      - Bidang 1: Liturgi, Persekutuan Doa, Pendalaman Iman, Katekumen, Legiomaria

      - Bidang 2: Media & Informasi, Kreatif Ministri, Paduan Suara

      - Bidang 3: Komisariat

      '
  utter_struktur_adhyatmaka:
  - text: "Struktur UKM Adhyatmaka terdiri dari badan pengurus harian inti dan pembagian\
      \ ke dalam beberapa bidang/divisi \nyang mengelola kegiatan rohani, media, dan\
      \ koordinasi anggota.\n"
  utter_fasilitas_adhyatmaka:
  - text: 'Fasilitas UKM Adhyatmaka berupa ruang sekretariat yang digunakan untuk
      berkumpul dan koordinasi kegiatan.

      '
  utter_benefit_adhyatmaka:
  - text: 'Manfaat bergabung di UKM Adhyatmaka:

      - Memperdalam iman dan spiritualitas

      - Menambah relasi dan komunitas

      - Mengembangkan diri dalam pelayanan

      - Mendapat pengalaman rohani yang bermakna

      '
  utter_media_informasi_adhyatmaka:
  - text: 'Informasi terbaru UKM Adhyatmaka dapat diakses melalui Instagram resmi
      @adhyatmakauntar

      Kamu juga bisa menghubungi contact person:

      +62 858-9311-1320 (Priciella Priska)'
  utter_tanya_ukm_bar:
  - text: UKM BAR adalah Unit Kegiatan Mahasiswa di Universitas Tarumanagara yang
      bergerak di bidang musik dan seni pertunjukan. UKM ini menjadi wadah bagi mahasiswa
      untuk mengembangkan minat, bakat, kreativitas, dan kemampuan bermusik.
  utter_fungsi_ukm_bar:
  - text: UKM BAR berfungsi sebagai wadah pengembangan bakat musik mahasiswa, tempat
      berorganisasi, meningkatkan kreativitas, serta membangun relasi dan pengalaman
      di bidang seni musik.
  utter_tujuan_ukm_bar:
  - text: Tujuan UKM BAR adalah mengembangkan potensi mahasiswa di bidang musik, meningkatkan
      kreativitas, mempererat hubungan antar mahasiswa, dan menciptakan lingkungan
      positif bagi penggemar musik.
  utter_visi_bar:
  - text: Visi UKM BAR adalah menjadi organisasi musik sekaligus wadah mahasiswa yang
      aktif, kreatif, profesional, dan mampu mengembangkan potensi mahasiswa di bidang
      seni musik.
  utter_misi_bar:
  - text: 'Misi UKM BAR:

      1. Mengembangkan kemampuan musik anggota.

      2. Menyelenggarakan kegiatan seni dan musik.

      3. Menjalin kerja sama dengan organisasi lain.

      4. Menjadi wadah kreativitas mahasiswa.

      '
  utter_bidang_ukm_bar:
  - text: UKM BAR bergerak di bidang seni musik, band performance, produksi musik,
      event musik, dan pengembangan kreativitas mahasiswa.
  utter_boleh_gabung_bar:
  - text: UKM BAR terbuka untuk seluruh mahasiswa Universitas Tarumanagara dari semua
      jurusan dan angkatan, termasuk pemula yang memiliki minat di bidang musik.
  utter_cara_daftar_bar:
  - text: Pendaftaran UKM Citra Pesona dilakukan dengan mengisi data diri melalui
      Google Form
  utter_biaya_daftar_bar:
  - text: Biaya pendaftaran UKM BAR berkisar Rp. 50.000 - Rp.100.000 namun dapat berbeda
      setiap periode kepengurusan. Informasi detail biasanya diumumkan saat open recruitment
      berlangsung.
  utter_status_pendaftaran_bar:
  - text: Informasi pembukaan pendaftaran anggota baru UKM BAR dapat dilihat melalui
      media sosial resmi.
  utter_syarat_anggota_bar:
  - text: Syarat umum bergabung dengan UKM BAR adalah mahasiswa aktif Universitas
      Tarumanagara, memiliki minat di bidang musik, dan mengikuti proses pendaftaran
      yang berlaku.
  utter_kemampuan_anggota_bar:
  - text: Pemula tetap dapat bergabung dengan UKM BAR. Tidak semua anggota diwajibkan
      memiliki kemampuan musik profesional karena UKM BAR juga menjadi tempat belajar
      dan berkembang.
  utter_divisi_bar:
  - text: 'UKM BAR memiliki beberapa divisi seperti:

      - Divisi Performer

      - Divisi Studio

      - Divisi Event Organizer

      - Divisi Kreatif

      - Divisi Keruangan

      '
  utter_struktur_bar:
  - text: Struktur organisasi UKM BAR terdiri dari ketua, wakil ketua, sekretaris,
      bendahara, dan beberapa divisi kepengurusan yang mendukung kegiatan organisasi.
  utter_kegiatan_bar:
  - text: Kegiatan UKM BAR meliputi latihan musik, performance, event musik, gathering
      anggota, produksi karya musik, dan kegiatan organisasi lainnya.
  utter_kegiatan_rutin_bar:
  - text: Kegiatan rutin UKM BAR biasanya berupa latihan musik, diskusi musik, persiapan
      event, dan pertemuan anggota.
  utter_jadwal_latihan_bar:
  - text: Jadwal latihan UKM BAR biasanya disesuaikan dengan agenda anggota atau grup
      band masing masing.
  utter_durasi_kegiatan_bar:
  - text: Durasi latihan atau kegiatan UKM BAR umumnya disesuaikan dengan anggota
      atau grup band masing masing.
  utter_lokasi_kegiatan_bar:
  - text: Kegiatan UKM BAR biasanya dilaksanakan di studio musik bar yang terletak
      di Lantai 6 Geedung M Untar 1.
  utter_event_bar:
  - text: UKM BAR sering mengadakan event musik, performance kampus, gathering anggota,
      produksi musik, dan kegiatan hiburan lainnya.
  utter_jadwal_event_bar:
  - text: Jadwal event UKM BAR diumumkan melalui media sosial resmi dan informasi
      internal organisasi.
  utter_fasilitas_bar:
  - text: UKM BAR menyediakan fasilitas seperti studio musik, alat musik, ruang sekretariat,
      dan perlengkapan pendukung kegiatan musik.
  utter_lokasi_sekre_bar:
  - text: Lokasi sekretariat UKM BAR dapat ditanyakan langsung kepada pengurus atau
      melalui media sosial resmi UKM BAR.
  utter_prestasi_bar:
  - text: UKM BAR memiliki berbagai pengalaman tampil dan berpartisipasi dalam event
      maupun kompetisi musik di lingkungan kampus maupun luar kampus.
  utter_benefit_bar:
  - text: 'Benefit bergabung dengan UKM BAR:

      - Mengembangkan kemampuan musik

      - Menambah relasi pertemanan

      - Mendapat pengalaman tampil

      - Belajar organisasi dan teamwork

      - Menyalurkan kreativitas di bidang musik

      '
  utter_media_informasi_bar:
  - text: Informasi resmi UKM BAR dapat diperoleh melalui media sosial resmi @baruntar.
  utter_tanya_ukm_citrapesona:
  - text: 'UKM Citra Pesona (CP) adalah Unit Kegiatan Mahasiswa yang bergerak di bidang
      seni, khususnya tari tradisional, modern dance, hip hop, serta modeling dan
      event organizer (EO).

      UKM ini menjadi wadah bagi mahasiswa untuk menyalurkan minat dan bakat di bidang
      seni pertunjukan dengan bimbingan coach yang berpengalaman.

      '
  utter_fungsi_ukm_citrapesona:
  - text: 'Fungsi UKM Citra Pesona adalah sebagai wadah pengembangan minat dan bakat
      mahasiswa di bidang seni, khususnya tari dan modeling, serta sebagai sarana
      untuk meningkatkan kreativitas, kepercayaan diri, dan kemampuan tampil di depan
      umum.

      '
  utter_tujuan_ukm_citrapesona:
  - text: 'Tujuan UKM Citra Pesona adalah untuk menyalurkan dan mengembangkan potensi
      mahasiswa di bidang seni tari dan modeling, serta membentuk anggota yang kreatif,
      percaya diri, dan mampu berprestasi di bidang seni pertunjukan.

      '
  utter_misi_citrapesona:
  - text: 'Misi UKM Citra Pesona adalah mengembangkan kemampuan anggota dalam bidang
      seni tari dan modeling, meningkatkan kualitas latihan secara berkelanjutan,
      serta mendorong anggota untuk aktif berpartisipasi dalam berbagai kegiatan dan
      kompetisi seni.

      '
  utter_visi_citrapesona:
  - text: 'Visi UKM Citra Pesona adalah menjadi wadah seni yang unggul, kreatif, dan
      berprestasi di tingkat kampus maupun di luar kampus.

      '
  utter_bidang_ukm_citrapesona:
  - text: 'UKM Citra Pesona bergerak di bidang seni, khususnya seni tari dan modeling,
      yang mencakup tari tradisional, modern dance, hip hop, serta kegiatan event
      organizer (EO).

      '
  utter_boleh_gabung_citrapesona:
  - text: 'UKM Citra Pesona terbuka untuk seluruh mahasiswa Universitas Tarumanagara
      dari berbagai jurusan dan angkatan. Mahasiswa pria maupun wanita dapat bergabung,
      termasuk pemula yang memiliki minat di bidang seni.

      '
  utter_cara_daftar_citrapesona:
  - text: 'Pendaftaran UKM Citra Pesona dilakukan dengan mengisi data diri melalui
      Google Form, kemudian mengikuti proses audisi.

      Selain itu, pendaftaran juga dapat dilakukan secara offline di Lantai 7 Gedung
      M.

      '
  utter_biaya_daftar_citrapesona:
  - text: 'Biaya pendaftaran UKM Citra Pesona adalah sebesar Rp40.000.

      '
  utter_status_pendaftaran_citrapesona:
  - text: 'Informasi mengenai pembukaan pendaftaran UKM Citra Pesona dapat dilihat
      melalui media sosial resmi. Umumnya pendaftaran dibuka saat periode awal semester
      atau saat kegiatan rekrutmen mahasiswa baru.

      '
  utter_audisi_citrapesona:
  - text: 'Ya, terdapat proses audisi untuk bergabung dengan UKM Citra Pesona. Audisi
      bertujuan untuk mengetahui kemampuan dasar peserta, terutama dalam bidang tari.

      '
  utter_syarat_anggota_citrapesona:
  - text: 'Persyaratan untuk bergabung dengan UKM Citra Pesona adalah memiliki komitmen
      dalam mengikuti kegiatan serta memiliki dasar kemampuan menari (basic dance).

      '
  utter_kemampuan_anggota_citrapesona:
  - text: 'Anggota UKM Citra Pesona diharapkan memiliki kemampuan dasar dalam menari.
      Namun, kemampuan tersebut dapat terus dikembangkan melalui latihan rutin bersama
      coach.

      '
  utter_divisi_citrapesona:
  - text: 'UKM Citra Pesona memiliki pembagian bidang kegiatan sesuai dengan jenis
      seni yang dikembangkan, seperti modern dance, hip hop, dan modeling.

      '
  utter_struktur_citrapesona:
  - text: 'Struktur organisasi UKM Citra Pesona terdiri dari badan pengurus harian
      inti, serta pengurus dan anggota yang mendukung jalannya kegiatan dan program
      kerja UKM.

      '
  utter_kegiatan_citrapesona:
  - text: 'Kegiatan UKM Citra Pesona meliputi latihan rutin tari, kegiatan pelatihan
      seperti Training and Fun, serta kegiatan kebersamaan seperti gathering dan event
      lainnya.

      '
  utter_kegiatan_rutin_citrapesona:
  - text: 'Kegiatan rutin UKM Citra Pesona adalah latihan tari yang dilakukan secara
      berkala sesuai dengan jadwal masing-masing bidang.

      '
  utter_jadwal_latihan_citrapesona:
  - text: 'Jadwal latihan UKM Citra Pesona antara lain:

      - Modeling: hari Rabu (±2 jam)

      - Hip hop: hari Kamis (±2 jam)

      '
  utter_durasi_kegiatan_citrapesona:
  - text: 'Durasi setiap kegiatan atau latihan di UKM Citra Pesona umumnya berlangsung
      sekitar 2 jam per sesi.

      '
  utter_lokasi_kegiatan_citrapesona:
  - text: 'Kegiatan UKM Citra Pesona dilaksanakan di lingkungan kampus Universitas
      Tarumanagara.

      Beberapa kegiatan khusus seperti Training and Fun diadakan di luar kota, seperti
      di Puncak.

      '
  utter_event_citrapesona:
  - text: 'UKM Citra Pesona memiliki beberapa program dan event, antara lain:

      - Training and Fun (LK)

      - SPARTA

      - Gathering

      '
  utter_event_tnf_citrapesona:
  - text: 'Training and Fun (LK) adalah kegiatan pelatihan dan kebersamaan anggota
      UKM Citra Pesona yang biasanya dilaksanakan di luar kota untuk meningkatkan
      kekompakan dan kemampuan anggota.

      '
  utter_event_gathering_citrapesona:
  - text: 'Gathering merupakan kegiatan kebersamaan anggota UKM Citra Pesona yang
      bertujuan untuk mempererat hubungan antar anggota.

      '
  utter_jadwal_event_citrapesona:
  - text: 'Jadwal event UKM Citra Pesona disesuaikan dengan program kerja tahunan
      dan dapat berbeda setiap periode kepengurusan.

      '
  utter_jadwal_tnf_citrapesona:
  - text: 'Training and Fun biasanya dilaksanakan pada periode tertentu sesuai dengan
      program kerja, dan umumnya diadakan di Puncak.

      '
  utter_jadwal_gathering_citrapesona:
  - text: 'Gathering dilaksanakan sesuai dengan agenda internal UKM untuk mempererat
      hubungan antar anggota.

      '
  utter_fasilitas_citrapesona:
  - text: 'UKM Citra Pesona menyediakan fasilitas berupa ruang sekretariat yang digunakan
      sebagai tempat berkumpul dan koordinasi kegiatan.

      '
  utter_prestasi_citrapesona:
  - text: 'Salah satu prestasi UKM Citra Pesona adalah meraih Runner Up pada kompetisi
      TSAC tahun 2025.

      '
  utter_benefit_citrapesona:
  - text: 'Manfaat bergabung dengan UKM Citra Pesona antara lain:

      - Mengembangkan kemampuan di bidang seni tari dan modeling

      - Meningkatkan kepercayaan diri

      - Mendapatkan pengalaman tampil dan mengikuti kompetisi

      - Memperluas relasi dan pengalaman organisasi

      '
  utter_media_informasi_citrapesona:
  - text: 'Informasi terbaru mengenai UKM Citra Pesona dapat diakses melalui Instagram
      resmi @citrapesonauntr.

      Untuk pertanyaan lebih lanjut, dapat menghubungi contact person melalui LINE:
      @936mfvwf'
  utter_tanya_ukm_dharmayana:
  - text: "UKM Dharmayana adalah organisasi mahasiswa yang bergerak di bidang keagamaan,\
      \ khususnya agama Buddha. \nUKM ini menjadi wadah bagi mahasiswa untuk memperdalam\
      \ ajaran Buddha serta membangun komunitas spiritual di kampus.\n"
  utter_fungsi_ukm_dharmayana:
